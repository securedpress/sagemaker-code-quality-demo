name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (isort + black + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.10"
      - run: pip install isort black flake8
      - run: isort . --check-only --diff
      - run: black . --check
      - run: flake8 good_example/

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.10"
      - run: pip install bandit
      - name: Scan bad_example — expect findings
        run: |
          echo "=== bad_example findings (expected CRITICAL + HIGH) ==="
          bandit bad_example/feature_engineering_ai.py || true
      - name: Scan good_example — must pass clean
        run: bandit good_example/feature_engineering_fixed.py

  types:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.10"
      - run: pip install mypy pandas-stubs
      - name: Type check good_example — must pass
        run: mypy good_example/feature_engineering_fixed.py --strict --ignore-missing-imports

  quality:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint, security, types]
    steps:
      - name: All checks passed
        run: echo "✓ All quality gates passed on good_example"
